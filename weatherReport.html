<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="weather-report">
    <input type="text" id="city" placeholder="type your city name">
    <button id="weather-btn" onclick="getWeather()">Check Weather</button>
    <div id="weather-result"></div>
</div>

<script>
async function getWeather() {
    const cityName = document.getElementById("city").value;
    const weatherResult = document.getElementById("weather-result");

    if (!cityName) {
        weatherResult.innerHTML = "❌ Please enter city name";
        return;
    }

    weatherResult.innerHTML = "⏳ Loading...";

    try {
        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=8b76707db55bdcd57152b549265768bc&units=metric`
        );

        if (!res.ok) {
            throw new Error("City not found");
        }

        const data = await res.json();

        weatherResult.innerHTML = `
            <h2>${data.name}</h2>
            <p>🌡 Temp: ${data.main.temp}°C</p>
            <p>🌥 Weather: ${data.weather[0].main}</p>
        `;
    } catch (err) {
        weatherResult.innerHTML = `❌ ${err.message}`;
    }
}
</script>
</body>
</html>
