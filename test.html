<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const multiply = (a) => (b) => a * b;

        const double = multiply(2);
        const triple = multiply(3);

        console.log(double(5)); // 10
        console.log(triple(5)); // 15
    </script>
</body>
</html>
